# Generated from:
# https://github.com/plone/meta/tree/2.x/src/plone/meta/default
# See the inline comments on how to expand/tweak this configuration file
[meta]
template = "default"
commit-id = "2.8.0"

[pyproject]
codespell_ignores = "Dokument"
codespell_skip = "*.min.js,*.min.js.map,yarn.lock,*.po,*.robot,*.json"
dependencies_ignores = """
[
    'collective.geolocationbehavior', 'plone.formwidget.geolocation',
    'plone.app.blocks', 'plone.tiles', 'plone.app.tiles', 'plone.app.portlets',
    'pytz', 'Acquisition', 'Products.Five', 'zope.component', 'zope.globalrequest',
    'zope.i18n', 'zope.i18nmessageid', 'zope.interface', 'zope.publisher',
    'zope.schema', 'zope.traversing', 'zope.lifecycleevent',
]
"""

# pyproject.toml packaging.
extra_lines = """
[project]
name = "collective.collectionfilter"
version = ""
description = "Plone addon for filtering collection results."
readme = "README.md"
license = "GPL-2.0-only"
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Framework :: Plone",
    "Framework :: Plone :: 6.2",
    "Framework :: Plone :: Addon",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
keywords = ["plone collection filter faceted tagcloud tags"]
authors = [{name = "Johannes Raggam", email = "thetetet@gmail.com"}]
dependencies = [
    "plone.api >= 2.0.0",
    "plone.app.contenttypes",
    "plone.app.event",
    "plone.app.querystring",
    "plone.app.uuid",
    "plone.app.vocabularies",
    "plone.app.z3cform",
    "plone.autoform",
    "plone.base",
    "plone.dexterity",
    "plone.i18n",
    "plone.memoize",
    "plone.portlets",
    "plone.supermodel",
    "plone.uuid",
    "z3c.form",
    "Products.CMFCore",
    "Products.CMFPlone",
]

[project.optional-dependencies]
mosaic = ["plone.app.mosaic"]
geolocation = ["collective.geolocationbehavior >= 1.7.2", "plone.formwidget.geolocation >= 3.0.0"]
test = ["plone.app.mosaic", "plone.browserlayer", "plone.testing", "robotsuite", "collective.geolocationbehavior", "plone.app.testing[robot]", "plone.app.robotframework", "plone.app.contenttypes", "plone.app.portlets", "plone.app.textfield", "plone.tiles"]

[project.urls]
Homepage = "http://github.com/collective/collective.collectionfilter"

[project.entry-points."z3c.autoinclude.plugin"]
target = "plone"
"""

[gitignore]
extra_lines = """
forest.*
test_*
robot_*
dependencies.svg
playwright-log.txt
log.html
output.xml
report.html
"""

[tox]
test_extras = """
    geolocation
    mosaic
"""
test_matrix = {"6.2" = ["*"]}
